# Maglev Evolution Observatory - 竞品注册表
# 维护所有 Maglev 观察的框架/产品及其 insights 状态
#
# 本文件是 evolution-observatory skill 的唯一状态源
# 存储位置: specs/10_reality/competitive_registry.yaml
#
# Insight Schema v2 (2026-05-25):
#   每条 insight 除基础字段 (id, title, target, priority, status) 外，
#   增加需求预测字段:
#     demand_driver: 是什么用户痛点/场景驱动了这个竞品能力
#     demand_signal: high/medium/low — 需求的受众规模和紧迫度
#     maglev_applicability: high/medium/low — Maglev 用户是否有同样痛点
#     response_strategy: absorb/differentiate/watch — Maglev 应如何回应
#   本质意图: 深度洞察 = 需求预测，不是"看到好的就抄"
#
# 2026-05-25 定位修正:
#   基于 specs/10_reality/positioning.md 锚定规则重审全部 insights
#   核心原则: Maglev 是上游输入层+下游验证层，非编码工具竞品

